name: Build Windows executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

# Needed to attach the built .exe to the release (the default GITHUB_TOKEN
# is read-only on new repositories).
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Build
        run: python deploy/build_windows.py

      - uses: actions/upload-artifact@v4
        with:
          name: tracedownloader-windows
          path: dist/tracedownloader.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tracedownloader.exe
