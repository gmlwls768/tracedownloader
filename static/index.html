<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>yt-dlp & gallery-dl GUI</title>
<style>
:root {
  --bg: #1e1f24; --panel: #26272e; --panel2: #2d2e36; --border: #3a3b45;
  --fg: #d8d9e0; --fg-dim: #8b8d98; --accent: #4a9eff;
  --green: #4caf7d; --red: #e05555; --yellow: #d8a637; --blue: #4a9eff;
  --gray: #7a7c88; --purple: #a58cd6;
  --fs: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--fg);
  font-family: -apple-system, "Segoe UI", "Noto Sans KR", sans-serif;
  font-size: var(--fs); display: flex; flex-direction: column; overflow: hidden;
}
/* ── top bar ── */
#topbar { display: flex; gap: 8px; padding: 10px 12px; background: var(--panel); border-bottom: 1px solid var(--border); align-items: flex-start; flex-wrap: wrap; }
#urlbox { flex: 1; min-width: 280px; background: var(--panel2); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: var(--fs); resize: vertical; min-height: 38px; max-height: 140px; font-family: inherit; }
button { background: var(--panel2); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; font-size: var(--fs); cursor: pointer; white-space: nowrap; font-family: inherit; }
button:hover { background: #383a44; }
button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
button.primary:hover { filter: brightness(1.1); }
button.danger:hover { background: var(--red); border-color: var(--red); color: #fff; }
/* ── second bar: search + tabs ── */
#bar2 { display: flex; gap: 8px; padding: 8px 12px; background: var(--panel); border-bottom: 1px solid var(--border); align-items: center; flex-wrap: wrap; }
#search { width: 240px; background: var(--panel2); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: var(--fs); font-family: inherit; }
.tab { padding: 6px 18px; border-radius: 6px 6px 0 0; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; color: var(--fg-dim); }
.tab.on { color: var(--fg); border-bottom-color: var(--accent); font-weight: 700; }
#done-controls { display: none; gap: 6px; align-items: center; margin-left: auto; flex-wrap: wrap; }
#done-controls select { background: var(--panel2); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 6px; font-size: calc(var(--fs) - 1px); font-family: inherit; }
#done-controls button { padding: 6px 10px; font-size: calc(var(--fs) - 1px); }
#done-status { color: var(--yellow); font-size: calc(var(--fs) - 1px); }
/* ── table ── */
#tablewrap { flex: 1; overflow: auto; }
table { width: 100%; border-collapse: collapse; }
th { position: sticky; top: 0; background: var(--panel2); color: var(--fg-dim); text-align: left; padding: 7px 10px; font-size: calc(var(--fs) - 1px); border-bottom: 1px solid var(--border); z-index: 2; user-select: none; }
td { padding: 6px 10px; border-bottom: 1px solid #2a2b33; vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
tr.row { cursor: default; user-select: none; }
tr.row:hover { background: #2b2d36; }
tr.row.sel { background: #34415a !important; }
tr.grouprow { font-weight: 600; }
tr.grouprow.drag-over td { border-top: 2px solid var(--accent); }
tr.vidrow { font-weight: 400; color: #b8bac4; }
tr.vidrow td:first-child { padding-left: 34px; }
.st-completed { color: var(--green); } .st-error { color: var(--red); }
.st-downloading { color: var(--blue); } .st-paused { color: var(--yellow); }
.st-skipped { color: var(--gray); } .st-queued { color: var(--fg-dim); }
.st-resolving { color: var(--purple); } .st-cancelled { color: var(--gray); }
.g-completed td:nth-child(3) { color: var(--green); }
.expander { display: inline-block; width: 20px; color: var(--fg-dim); cursor: pointer; }
.namecell { max-width: 480px; }
.msgcell { max-width: 420px; color: var(--fg-dim); font-size: calc(var(--fs) - 1px); }
.prio { color: var(--yellow); }
.pbar { display: inline-block; width: 72px; height: 8px; background: #3a3b45; border-radius: 4px; overflow: hidden; vertical-align: middle; margin-right: 6px; }
.pbar > i { display: block; height: 100%; background: var(--blue); }
/* ── status bar ── */
#statusbar { display: flex; gap: 18px; padding: 7px 12px; background: var(--panel); border-top: 1px solid var(--border); color: var(--fg-dim); font-size: calc(var(--fs) - 1px); flex-wrap: wrap; }
#conn { margin-left: auto; }
#conn.ok { color: var(--green); } #conn.bad { color: var(--red); }
/* ── context menu ── */
#ctxmenu { position: fixed; display: none; background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 6px 24px rgba(0,0,0,.5); z-index: 100; min-width: 240px; padding: 4px; }
#ctxmenu div { padding: 7px 14px; border-radius: 5px; cursor: pointer; }
#ctxmenu div:hover { background: var(--accent); color: #fff; }
#ctxmenu hr { border: none; border-top: 1px solid var(--border); margin: 4px 6px; }
#ctxmenu div.danger:hover { background: var(--red); }
/* ── modal ── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center; z-index: 200; }
.modal { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 20px 22px; min-width: 380px; max-width: 620px; max-height: 84vh; overflow: auto; }
.modal h3 { margin-bottom: 14px; font-size: calc(var(--fs) + 2px); }
.modal .frow { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.modal .frow label { flex: 1; }
.modal input[type=number], .modal input[type=text], .modal select { background: var(--panel2); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 9px; font-size: var(--fs); width: 150px; font-family: inherit; }
.modal input[type=text].wide { width: 260px; }
.modal .hint { color: var(--fg-dim); font-size: calc(var(--fs) - 2px); margin: -6px 0 10px; }
.modal .btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal pre { background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: calc(var(--fs) - 2px); max-height: 260px; overflow: auto; white-space: pre-wrap; word-break: break-all; }
.modal textarea.mono { width: 100%; background: var(--panel2); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-size: calc(var(--fs) - 2px); font-family: ui-monospace, monospace; resize: vertical; margin-bottom: 4px; }
/* ── toasts ── */
#toasts { position: fixed; right: 16px; bottom: 46px; display: flex; flex-direction: column; gap: 8px; z-index: 300; }
.toast { background: #34363f; border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 8px; padding: 10px 16px; box-shadow: 0 4px 16px rgba(0,0,0,.4); animation: fadein .18s; max-width: 420px; }
@keyframes fadein { from { opacity: 0; transform: translateY(8px); } }
</style>
</head>
<body>

<div id="topbar">
  <textarea id="urlbox" rows="1"></textarea>
  <button class="primary" id="btn-add" onclick="addUrls()"></button>
  <button id="btn-start-all" onclick="api('/api/start_all')"></button>
  <button class="danger" id="btn-stop-all" onclick="api('/api/stop_all')"></button>
  <button id="btn-save" onclick="api('/api/save')"></button>
  <button id="btn-settings" onclick="openSettings()"></button>
  <button class="danger" id="btn-shutdown" onclick="confirmShutdown()"></button>
</div>

<div id="bar2">
  <input id="search">
  <button class="tab on" id="tab-active" onclick="setTab('active')"><span class="lbl"></span> (<span id="n-active">0</span>)</button>
  <button class="tab" id="tab-done" onclick="setTab('done')"><span class="lbl"></span> (<span id="n-done">0</span>)</button>
  <button class="tab" id="tab-ephemeral" onclick="setTab('ephemeral')"><span class="lbl"></span> (<span id="n-ephemeral">0</span>)</button>
  <div id="done-controls">
    <span id="done-status"></span>
    <select id="done-sort" onchange="render()">
      <option value="modified" id="opt-sort-modified"></option>
      <option value="created" id="opt-sort-created"></option>
      <option value="name" id="opt-sort-name"></option>
    </select>
    <button onclick="toggleAsc()" id="asc-btn"></button>
    <button id="btn-recheck-all" onclick="confirmRecheckAll()"></button>
    <button id="btn-retry-all" onclick="confirmRetryAll()"></button>
    <button id="btn-redownload-all" onclick="confirmRedownloadAll()"></button>
    <button id="btn-res-check-all" onclick="resCheckAll()"></button>
    <button id="btn-size-check-all" onclick="sizeCheckAll()"></button>
    <button id="btn-missing-check-all" onclick="missingCheckAll()"></button>
  </div>
</div>

<div id="tablewrap">
  <table>
    <thead><tr>
      <th style="width:110px"></th>
      <th class="namecell" id="th-name"></th>
      <th style="width:110px" id="th-state"></th>
      <th style="width:150px" id="th-progress"></th>
      <th style="width:140px" id="th-speed"></th>
      <th id="th-message"></th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="statusbar">
  <span id="count-str"></span>
  <span id="speed-str"></span>
  <span id="outdir" style="cursor:pointer"></span>
  <span id="conn" class="bad"></span>
</div>

<div id="ctxmenu"></div>
<div class="modal-bg" id="modal-bg"><div class="modal" id="modal"></div></div>
<div id="toasts"></div>

let LANG = localStorage.getItem('lang') === 'ko' ? 'ko' : 'en';
function t(key, params) {
  const tpl = (MSG[LANG] && MSG[LANG][key]) || (MSG.en && MSG.en[key]) || key;
  if (!params) return tpl;
  return tpl.replace(/\{(\w+)\}/g, (m, k) => (params[k] !== undefined && params[k] !== null ? params[k] : ''));
}
function decodeMsg(raw) {
  if (!raw) return '';
  const i = raw.indexOf(':');
  const code = i === -1 ? raw : raw.slice(0, i);
  if (!(MSG.en && Object.prototype.hasOwnProperty.call(MSG.en, code))) return raw;
  let params = {};
  if (i !== -1) {
    try { params = JSON.parse(raw.slice(i + 1)); } catch (e) { return raw; }
  }
  return t(code, params);
}

const $ = id => document.getElementById(id);
function esc(s) { return (s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
async function api(path, body) {
  const r = await fetch(path, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body || {}) });
  if (!r.ok) { toast(t('request_failed', { path })); return null; }
  return r.json();
}
function toast(msg) {
  const d = document.createElement('div');
  d.className = 'toast'; d.textContent = msg;
  $('toasts').appendChild(d);
  setTimeout(() => d.remove(), 3500);
}
function saveExpanded() { localStorage.setItem('expanded', JSON.stringify([...EXPANDED])); }

  const q = encodeURIComponent($('search').value.trim());
  const exp = encodeURIComponent([...EXPANDED].join(','));
  try {
    const r = await fetch(`/api/state?q=${q}&expanded=${exp}`);
    SNAP = await r.json();
    render();
  } catch (e) { /* server restarting etc. — SSE reconnect will pick it back up */ }
}
function scheduleFetch() {
  if (PENDING) return;
  const wait = Math.max(0, MIN_FETCH_MS - (Date.now() - LAST_FETCH));
  PENDING = true;
  clearTimeout(FETCH_TIMER);
  FETCH_TIMER = setTimeout(fetchState, wait);
}
function connectSSE() {
  const es = new EventSource('/api/events');
  es.onopen  = () => { $('conn').className = 'ok'; $('conn').textContent = t('conn_connected'); scheduleFetch(); };
  es.onerror = () => { $('conn').className = 'bad'; $('conn').textContent = t('conn_reconnecting'); };
  es.onmessage = ev => {
    const d = JSON.parse(ev.data);
    (d.toasts || []).forEach(m => toast(decodeMsg(m)));
    scheduleFetch();
  };
}

// ───────── render ─────────
function stateCls(s) { return 'st-' + s; }
function stateLabel(s) { return t('state_' + s) || s; }
function fmtSpeed(bps) {
  if (!bps || bps <= 0) return '0 B/s';
  const units = ['B/s','KB/s','MB/s','GB/s'];
  let v = bps;
  for (const u of units) {
    if (v < 1024 || u === units[units.length - 1]) return v.toFixed(1) + ' ' + u;
    v /= 1024;
  }
}
function groupRow(g, showRank) {
  const exp = EXPANDED.has(g.id);
  const arrow = (g.expected > 0 || exp) ? (exp ? '▼' : '▶') : '·';
  const rankTxt = showRank ? `#${g.rank} 📁` : `✅ ${g.modified_at ? new Date(g.modified_at * 1000).toISOString().slice(0,10) : ''}`;
  const cnt = `${g.completed}/${g.expected === null ? '?' : g.expected} (${g.pct}%)`;
  const dl = g.dling ? `${g.dling}` : '';
  const prio = g.priority ? '<span class="prio">★</span> ' : '';
  const msg = decodeMsg(g.message);
  return `<tr class="row grouprow g-${g.state} ${SELECTED.has(g.id) ? 'sel' : ''}" data-id="${g.id}" data-kind="group" draggable="${TAB === 'active'}">
    <td><span class="expander" data-exp="${g.id}">${arrow}</span>${rankTxt}</td>
    <td class="namecell" title="${esc(g.url)}">${prio}${esc(g.url)}</td>
    <td class="${stateCls(g.state)}">${esc(stateLabel(g.state))}</td>
    <td>${cnt}</td><td>${esc(dl)}</td>
    <td class="msgcell" title="${esc(msg)}">${esc(msg)}</td></tr>`;
}
function videoRow(v) {
  const icons = { completed:'✓', error:'✗', downloading:'⬇', paused:'⏸', skipped:'⤵', queued:'·', cancelled:'✕' };
  const pct = v.pct !== null && v.pct !== undefined ? `<span class="pbar"><i style="width:${v.pct}%"></i></span>${v.pct}%` : '';
  const speed = v.speed_bps ? fmtSpeed(v.speed_bps) : '';
  const msg = decodeMsg(v.message);
  return `<tr class="row vidrow ${SELECTED.has(v.id) ? 'sel' : ''}" data-id="${v.id}" data-kind="video">
    <td class="${stateCls(v.state)}">${icons[v.state] || '·'}</td>
    <td class="namecell" title="${esc(v.url)}">${esc(v.title || v.url)}</td>
    <td class="${stateCls(v.state)}">${esc(stateLabel(v.state))}</td>
    <td>${pct}</td><td>${esc(speed)}</td>
    <td class="msgcell" title="${esc(msg)}">${esc(msg)}</td></tr>`;
}
function ephemeralRow(e) {
  const icons = { resolving:'…', downloading:'⬇', completed:'✓', error:'✗' };
  const kindTxt = e.kind === 'gallery' ? t('kind_gallery') : t('kind_video');
  const msg = decodeMsg(e.message);
  return `<tr class="row vidrow" data-id="${e.id}" data-kind="ephemeral">
    <td class="${stateCls(e.state)}">${icons[e.state] || '·'}</td>
    <td class="namecell" title="${esc(e.url)}">${kindTxt} — ${esc(e.title || e.url)}</td>
    <td class="${stateCls(e.state)}">${esc(stateLabel(e.state))}</td>
    <td></td><td></td>
    <td class="msgcell" title="${esc(msg)}">${esc(msg)}</td></tr>`;
}
function statsLine() {
  const s = SNAP.stats || {};
  $('count-str').textContent = t('stats_summary', {
    done: s.video_done || 0, total: s.video_total || 0, skip: s.skipped || 0,
    dling: s.downloading || 0, cum: s.cum_total || 0 });
  $('speed-str').textContent = s.downloading
    ? t('stats_speed', { speed: fmtSpeed(s.avg_speed_bps), dling: s.downloading })
    : t('stats_speed_idle');
}
function render() {
  if (TAB === 'ephemeral') {
    $('tbody').innerHTML = (SNAP.ephemeral || []).map(ephemeralRow).join('');
    $('n-ephemeral').textContent = (SNAP.ephemeral || []).length;
    statsLine();
    $('outdir').textContent = '📂 ' + (SNAP.output_dir || '');
    return;
  }
  let groups = TAB === 'active' ? SNAP.active : SNAP.done.slice();
  if (TAB === 'done') {
    const k = $('done-sort').value;
    const key = { created: g => g.created_at, modified: g => g.modified_at, name: g => (g.url || '').toLowerCase() }[k];
    groups.sort((a, b) => (key(a) > key(b) ? 1 : -1) * (ASC_DONE ? 1 : -1));
  }
  let html = '';
  for (const g of groups) {
    html += groupRow(g, TAB === 'active');
    if (g.children) for (const v of g.children) html += videoRow(v);
  }
  if (TAB === 'active') for (const v of (SNAP.orphans || [])) html += videoRow(v);
  $('tbody').innerHTML = html;
  $('n-active').textContent = SNAP.active.length;
  $('n-done').textContent = SNAP.done.length;
  $('n-ephemeral').textContent = (SNAP.ephemeral || []).length;
  statsLine();
  $('done-status').textContent = decodeMsg(SNAP.done_status || '');
  $('outdir').textContent = '📂 ' + (SNAP.output_dir || '');
}

$('tbody').addEventListener('click', e => {
  const expEl = e.target.closest('.expander');
  if (expEl) {
    const gid = expEl.dataset.exp;
    EXPANDED.has(gid) ? EXPANDED.delete(gid) : EXPANDED.add(gid);
    saveExpanded(); fetchState();
    return;
  }
  const tr = e.target.closest('tr.row');
  if (!tr) return;
  const id = tr.dataset.id;
  if (e.ctrlKey || e.metaKey) {
    SELECTED.has(id) ? SELECTED.delete(id) : SELECTED.add(id);
  } else if (e.shiftKey && LAST_CLICK_ID) {
    const rows = [...document.querySelectorAll('tr.row')].map(r => r.dataset.id);
    const a = rows.indexOf(LAST_CLICK_ID), b = rows.indexOf(id);
    if (a >= 0 && b >= 0) rows.slice(Math.min(a,b), Math.max(a,b)+1).forEach(x => SELECTED.add(x));
  } else {
    SELECTED.clear(); SELECTED.add(id);
  }
  LAST_CLICK_ID = id;
  render();
});

  if (e.key === 'a' && (e.ctrlKey || e.metaKey) && document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'INPUT') {

    document.querySelectorAll('tr.row').forEach(r => SELECTED.add(r.dataset.id));

async function doAction(action) {

async function copyText(text) {
  // navigator.clipboard is unavailable on plain HTTP (non-secure context) — fall back to execCommand.
  if (navigator.clipboard && window.isSecureContext) {
    try { await navigator.clipboard.writeText(text); return true; } catch (e) {}
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch (e) {}
  ta.remove();
  return ok;
}
async function copyUrls() {
  const ids = new Set(SELECTED);
  const urls = [];
  for (const g of [...SNAP.active, ...SNAP.done]) {
    if (ids.has(g.id)) urls.push(g.url);
    for (const v of (g.children || [])) if (ids.has(v.id)) urls.push(v.url);
  }
  if (!urls.length) { toast(t('copy_urls_none')); return; }
  const ok = await copyText(urls.join('\n'));
  toast(ok ? t('copy_urls_ok', { n: urls.length }) : t('copy_fail'));
}

let dragId = null;
$('tbody').addEventListener('dragstart', e => {
  const tr = e.target.closest('tr.grouprow');
  if (!tr || TAB !== 'active') { e.preventDefault(); return; }
  dragId = tr.dataset.id;
  e.dataTransfer.effectAllowed = 'move';
});
$('tbody').addEventListener('dragover', e => {
  const tr = e.target.closest('tr.grouprow');
  if (!tr || !dragId) return;
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
  tr.classList.add('drag-over');
});
$('tbody').addEventListener('drop', async e => {
  const tr = e.target.closest('tr.grouprow');
  document.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
  if (!tr || !dragId || tr.dataset.id === dragId) { dragId = null; return; }
  e.preventDefault();
  // Rebuild the active-group order array with dragId inserted before the drop target.
  const order = SNAP.active.map(g => g.id).filter(id => id !== dragId);
  order.splice(order.indexOf(tr.dataset.id), 0, dragId);
  // Append completed groups too, to keep the full ordering.
  for (const g of SNAP.done) order.push(g.id);
  dragId = null;
  await api('/api/reorder', { group_ids: order });
});
$('tbody').addEventListener('dragend', () => {
  document.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
  dragId = null;
});

      <option value="16" ${s.font_scale == 16 ? 'selected' : ''}>${esc(t('font_xl'))}</option>
    </select></div>
    <hr style="border:none;border-top:1px solid var(--border);margin:12px 0">
    <div class="frow"><label>${esc(t('s_gallery_template_label'))}</label><input type="text" id="s-gallery-tpl" class="wide" value="${esc(s.gallery_folder_template)}"></div>
    <div class="hint">${esc(t('s_gallery_template_hint'))}</div>
    <div class="frow" style="align-items:flex-start"><label style="padding-top:6px">${esc(t('s_persist_label'))}</label></div>
    <textarea id="s-persist" class="mono" rows="3">${esc(s.persist_patterns)}</textarea>
    <div class="hint">${esc(t('s_persist_hint'))}</div>
    <div class="frow"><label>${esc(t('s_cookies_label'))}</label>
      <span style="color:${s.cookies_status && s.cookies_status.saved ? 'var(--green)' : 'var(--fg-dim)'}">${esc(cookiesInfo)}</span></div>
    <textarea id="s-cookies" class="mono" style="height:84px" placeholder="${esc(t('s_cookies_placeholder'))}"></textarea>
    <div class="frow"><label><input type="checkbox" id="s-ck-clear"> ${esc(t('s_cookies_clear'))}</label></div>
    <div class="btns"><button onclick="hideModal()">${esc(t('settings_cancel'))}</button>
    <button class="primary" onclick="saveSettings()">${esc(t('settings_save'))}</button></div>`);
}
async function saveSettings() {
  const newLang = $('s-lang').value;
  const s = {
    max_concurrent:      +$('s-max').value,
    autosave_minutes:    +$('s-autosave').value,
    output_dir:          $('s-outdir').value,
    res_filter_height:   +$('s-res').value,
    size_filter_mb:      +$('s-size').value,
    autostart:           $('s-autostart').checked,
    save_on_add:         $('s-saveonadd').checked,
    small_group_first:   $('s-small').checked,
    high_progress_first: $('s-hp').checked,
    auto_update_tools:   $('s-autoupdate').checked,
    font_scale:          +$('s-font').value,
    gallery_folder_template: $('s-gallery-tpl').value,
    persist_patterns:    $('s-persist').value,
    cookies:             $('s-cookies').value,
    cookies_clear:       $('s-ck-clear').checked,
  };
  await api('/api/settings', s);
  applyFont(s.font_scale);
  if (newLang !== LANG) {
    LANG = newLang;
    localStorage.setItem('lang', LANG);
    applyStaticText();
  }
  hideModal(); toast(t('settings_saved_toast'));
  fetchState();
}
function applyFont(scale) {
  document.documentElement.style.setProperty('--fs', (4 + (+scale || 10)) + 'px');
}
async function checkToolUpdatesNow() {
  await api('/api/check_updates');
}

// ───────── init ─────────
applyStaticText();
connectSSE();
fetchState();
fetch('/api/settings').then(r => r.json()).then(s => applyFont(s.font_scale)).catch(() => {});
</script>
</body>
